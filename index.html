<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;

    /* TEXTURE BACKGROUND */
    background: url('backgroundimage') no-repeat center/cover;
}

/* CARD */
.card {
    width: 100%;
    max-width: 900px;
    display: flex;
    padding: 30px;
    color: #fff;

}

/* LEFT LOGO */
.left {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.left img {
    width: 220px;
}

/* RIGHT CONTENT */
.right {
    flex: 2;
    position: relative;
}

/* VERTICAL LINE */
.right::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10px;
    bottom: 10px;
    width: 3px;
    background: #2e7d32;
}

/* NAME */
.name {
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 5px;
    padding-left: 30px;
}

/* ROLE */
.role {
    font-size: 20px;
    color: #2e7d32;
    margin-bottom: 20px;
    padding-left: 30px;
}

/* HORIZONTAL LINE */
.divider {
    height: 2px;
    background: #2e7d32;
    margin-bottom: 20px;
}

/* INFO GRID */
.info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px 30px;
    align-items: center;
    padding-left: 30px;
}

/* ITEM */
.item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}

.icon {
    font-size: 18px;
    color: #2e7d32;
}

/* QR */
.qr {
    position: absolute;
    right: 0;
    bottom: 0;
}

.qr img {
    width: 100px;
    background: #fff;
    padding: 5px;
}

/* 🔥 RESPONSIVE */
@media (max-width: 768px) {
    .card {
        flex-direction: column;
        text-align: center;
    }

    .right {
        padding-left: 0;
        margin-top: 20px;
    }

    .right::before {
        display: none;
    }

    .info {
        grid-template-columns: 1fr;
    }

    .qr {
        position: static;
        margin-top: 20px;
    }

    .left img {
        width: 150px;
    }
}
</style>

</head>
<body>

<div class="card">

    <!-- LEFT LOGO -->
    <div class="left">
        <img src="logo" alt="Logo">
    </div>

    <!-- RIGHT CONTENT -->
    <div class="right">
        <div class="name">JOSE MARI TUMALAD</div>
        <div class="role">IT Officer</div>

        <div class="divider"></div>

        <div class="info">
            <div class="item">
                <span class="icon">📞</span>
                0912345678
            </div>

            <div class="item">
                <span class="icon">📍</span>
                17 Payapa St. Brgy. Plainview Mandaluyong
            </div>

            <div class="item">
                <span class="icon">✉️</span>
                josemari.tumalad@accordaces.com
            </div>

            <div class="item">
                <span class="icon">🌐</span>
                www.accordaces.com
            </div>
        </div>

        <!-- QR -->
        <div class="qr">
            <img src="qr-code" alt="QR Code">
        </div>
    </div>

</div>

</body>
</html>
