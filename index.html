<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jomar Tumalad</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: #fff;

    background: url('backgroundimage') no-repeat center center/cover;
    padding: 20px; /* prevents edge cut on mobile */
}

/* CARD */
.card {
    width: 100%;
    max-width: 650px;
    padding: clamp(20px, 4vw, 30px);
    border-radius: 20px;

    background: rgba(15, 23, 42, 0.65);
    backdrop-filter: blur(15px);

    border: 1px solid rgba(56, 189, 248, 0.2);
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);

    display: flex;
    gap: clamp(15px, 4vw, 30px);
    align-items: center;

    position: relative;
}

/* LOGO */
.logo img {
    width: clamp(80px, 20vw, 120px);
}

/* CONTENT */
.content {
    flex: 1;
}

/* NAME */
.name {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 5vw, 28px);
    letter-spacing: 2px;
    margin-bottom: 5px;
}

/* ROLE */
.role {
    font-size: clamp(12px, 3vw, 14px);
    color: #38bdf8;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

/* CONTACT */
.contact {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.contact a {
    text-decoration: none;
    color: #e2e8f0;
    font-size: clamp(12px, 3vw, 14px);

    display: flex;
    align-items: center;
    gap: 10px;

    transition: 0.3s;
    word-break: break-word; /* prevents overflow */
}

.contact a:hover {
    color: #38bdf8;
    transform: translateX(5px);
}

/* NEON BORDER */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, #38bdf8, #22c55e);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
}

/* 🔥 MOBILE FIX */
@media (max-width: 600px) {
    .card {
        flex-direction: column;
        text-align: center;
    }

    .logo {
        display: flex;
        justify-content: center;
    }

    .contact a {
        justify-content: center;
    }
}
</style>

</head>

<body>

<div class="card">

    <div class="logo">
        <img src="logo" alt="Logo">
    </div>

    <div class="content">
        <div class="name">JOMAR TUMALAD</div>
        <div class="role">WEB DEVELOPER</div>

        <div class="contact">
            <a href="mailto:tumaladjomar@gmail.com">📧 tumaladjomar@gmail.com</a>
            <a href="https://linkedin.com/in/jomartumalad" target="_blank">🔗 linkedin.com/in/jomartumalad</a>
            <a href="https://github.com/jomtum" target="_blank">💻 github.com/jomtum</a>
            <a href="tel:+639123456789">📱 +63 912 345 6789</a>
        </div>
    </div>

</div>

</body>
</html>
