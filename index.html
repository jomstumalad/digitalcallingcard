<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jomar Tumalad</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: #fff;

    /* 🔥 BACKGROUND IMAGE */
    background: url('your-background.png') no-repeat center center/cover;
}

/* 🔥 GLASS CARD */
.card {
    width: 650px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(15, 23, 42, 0.65);
    backdrop-filter: blur(15px);

    border: 1px solid rgba(56, 189, 248, 0.2);
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);

    display: flex;
    gap: 30px;
    align-items: center;
}

/* LOGO */
.logo img {
    width: 120px;
}

/* CONTENT */
.content {
    flex: 1;
}

/* NAME */
.name {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 5px;
}

/* ROLE */
.role {
    font-size: 14px;
    color: #38bdf8;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

/* CONTACT ITEMS */
.contact {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.contact a {
    text-decoration: none;
    color: #e2e8f0;
    font-size: 14px;

    display: flex;
    align-items: center;
    gap: 10px;

    transition: 0.3s;
}

.contact a:hover {
    color: #38bdf8;
    transform: translateX(5px);
}

/* ICON STYLE */
.icon {
    width: 18px;
}

/* NEON EDGE EFFECT */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, #38bdf8, #22c55e);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
}
</style>

</head>

<body>

<div class="card">

    <!-- LOGO -->
    <div class="logo">
        <img src="your-logo.png" alt="Logo">
    </div>

    <!-- DETAILS -->
    <div class="content">
        <div class="name">JOMAR TUMALAD</div>
        <div class="role">WEB DEVELOPER</div>

        <div class="contact">
            <a href="mailto:tumaladjomar@gmail.com">
                📧 tumaladjomar@gmail.com
            </a>

            <a href="https://linkedin.com/in/jomartumalad" target="_blank">
                🔗 linkedin.com/in/jomartumalad
            </a>

            <a href="https://github.com/jomtum" target="_blank">
                💻 github.com/jomtum
            </a>

            <a href="tel:+639123456789">
                📱 +63 912 345 6789
            </a>
        </div>
    </div>

</div>

</body>
</html>
